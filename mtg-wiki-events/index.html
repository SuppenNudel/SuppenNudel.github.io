<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Embed Wikipedia mpChunk</title>
  <link rel="stylesheet" href="load.php">
  <link rel="stylesheet" href="customizations.css">
</head>
<body>
  <div id="embedded-content">Loading...</div>
  <script>
    // URL of the page to fetch (Wikipedia Main Page as example)
    const proxy = "https://corsproxy.io/?";
    const url = "https://mtg.wiki/";
    // The selector for the element to extract
  const selector = ".flex > div:nth-child(2) > div:nth-child(1)";

    fetch(proxy + encodeURIComponent(url))
      .then(response => response.text())
      .then(html => {
        // Parse the HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        // Query the element
        const element = doc.querySelector(selector);
        if (element) {
          document.getElementById("embedded-content").innerHTML = element.innerHTML;
        } else {
          document.getElementById("embedded-content").textContent = "Element not found.";
        }
      })
      .catch(err => {
        document.getElementById("embedded-content").textContent = "Error loading content: " + err;
      });
  </script>
</body>
</html>
